services:
  # 🔴 Reverse Proxy (Entry point)
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # 🟢 Frontend
  frontend:
    build: ./frontend
    container_name: frontend_app
    restart: always
    networks:
      - app-network

  # 🔵 Backend
  backend:
    build: ./backend
    container_name: backend_app
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # 🟡 Database
  mysql:
    image: mysql:8.0.36-debian
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskdb
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s
    networks:
      - app-network

# 📦 Volume lưu DB
volumes:
  mysql_data:

# 🌐 Network riêng
networks:
  app-network:
