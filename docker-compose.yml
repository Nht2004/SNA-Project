services:
  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: taskdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db.sql:/docker-entrypoint-initdb.d/db.sql

  backend:
    build: ./backend
    container_name: backend_app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    env_file:
      - ./backend/.env
    command: sh -c "sleep 10 && node server.js"

  frontend:
    build: ./frontend
    container_name: frontend_app
    ports:
      - "8080:80"

volumes:
  mysql_data: